<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    video { width: 100%; max-width: 500px; display: block; }
    canvas { display: none; }
    #status { color: #fff; font-family: sans-serif; font-size: 14px; padding: 10px; text-align: center; }
    #frame { position: relative; width: 100%; max-width: 500px; }
    .corner { position: absolute; width: 30px; height: 30px; }
    .tl { top: 10px; left: 10px; border-top: 4px solid #f59e0b; border-left: 4px solid #f59e0b; }
    .tr { top: 10px; right: 10px; border-top: 4px solid #f59e0b; border-right: 4px solid #f59e0b; }
    .bl { bottom: 10px; left: 10px; border-bottom: 4px solid #f59e0b; border-left: 4px solid #f59e0b; }
    .br { bottom: 10px; right: 10px; border-bottom: 4px solid #f59e0b; border-right: 4px solid #f59e0b; }
  </style>
</head>
<body>
  <div id="frame">
    <video id="v" autoplay playsinline muted></video>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
  <canvas id="c"></canvas>
  <div id="status">Starting camera...</div>
  <script>
    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const status = document.getElementById('status');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } })
      .then(stream => {
        video.srcObject = stream;
        video.play();
        status.textContent = 'Scanning for QR code...';
        requestAnimationFrame(scan);
      })
      .catch(err => { status.textContent = 'Camera error: ' + err.message; });

    function scan() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(img.data, img.width, img.height);
        if (code && code.data) {
          status.textContent = 'QR detected!';
          window.parent.postMessage({ type: 'QR_SCANNED', data: code.data }, '*');
          video.srcObject.getTracks().forEach(t => t.stop());
          return;
        }
      }
      requestAnimationFrame(scan);
    }
  </script>
</body>
</html>
